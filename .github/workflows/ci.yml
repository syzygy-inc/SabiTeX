name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build (wasm32)
        run: cargo build -p sabitex-core --target wasm32-unknown-unknown
      - name: Examples (smoke)
        run: |
          cargo build --release -p sabitex-cli
          cargo build --release -p sabitex-wasm --target wasm32-unknown-unknown
          cp reference/uptex/umin10.tfm examples/japanese/
          cp reference/uptex/umin10.tfm examples/mixed/
          (cd examples/hello && ../../target/release/sabitex --interaction=batchmode hello && test -s hello.dvi)
          (cd examples/japanese && ../../target/release/sabitex --interaction=batchmode japanese && test -s japanese.dvi)
          (cd examples/mixed && ../../target/release/sabitex --interaction=batchmode "*\input mixed" && test -s mixed.dvi)
          node examples/wasm-node/main.mjs
